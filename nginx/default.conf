# ── Upstreams ──────────────────────────────────────────────
upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS redirect + ACME challenge ────────────────
server {
    listen 80;
    server_name api.toladev.me;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.toladev.me;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/api.toladev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.toladev.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Laravel API (PHP-FPM) ─────────────────────────────
    # All /api requests go directly to PHP-FPM (no file check in nginx container)
    location /api {
        include fastcgi_params;
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/public;
        fastcgi_param SERVER_NAME     $host;
    }

    # Block access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ── Frontend (Next.js) ────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
