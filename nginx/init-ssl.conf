# This is a temporary configuration for the initial SSL certificate generation.
# It only listens on HTTP and serves the ACME challenge.

server {
    listen 80;
    server_name api.toladev.me;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (temporarily disabled)
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}
