services:

  db:
    image: mysql:8.0
    container_name: hotel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hotel_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USERNAME:-hotel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hotel_password}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - backend_storage:/var/www/storage
    environment:
      APP_NAME: "Hotel API"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: https://${DOMAIN:-localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hotel_db}
      DB_USERNAME: ${DB_USERNAME:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_password}
      JWT_SECRET: ${JWT_SECRET:-}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}
      FRONTEND_URL: https://${DOMAIN:-localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://localhost/api/auth/google/callback}
    networks:
      - hotel_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: hotel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - hotel_network
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_LARAVEL_API_URL: ${NEXT_PUBLIC_LARAVEL_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    container_name: hotel_frontend
    restart: unless-stopped
    networks:
      - hotel_network
    depends_on:
      - backend

  certbot:
    image: certbot/certbot:latest
    container_name: hotel_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - hotel_network

volumes:
  db_data:
    driver: local
  backend_storage:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  hotel_network:
    driver: bridge
